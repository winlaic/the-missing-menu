name: Publish to VS Code Marketplace

on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm ci

    - name: Compile
      run: npm run compile

    - name: Publish
      run: npx vsce publish
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}